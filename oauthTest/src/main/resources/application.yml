logging:
    file:
        name: logs/studydb.log
    level:
        jdbc:
            connection: info
            resultsettable: info
            sqlonly: info
            sqltiming: info
        root: info

server:
    port: 8080
    servlet:
        context-path: /oauthTest

spring:
    application:
        name: oauthTest

    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        password: Rlarhkddms66@
        url: jdbc:mysql://127.0.0.1:3306/studydb
        username: 123rhkddms2
    devtools:
        livereload:
            enabled: true
        restart:
            enabled: false
    jpa:
        database: mysql
        hibernate:
            ddl-auto: update
            naming:
                physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        properties:
            hibernate:
                format_sql: true
                show_sql: true

    servlet:
        multipart:
            location: uploads/
            max-file-size: 10MB

    thymeleaf:
        prefix: classpath:/templates

    security:
        oauth2:
          client:
            provider:
                kakao:
                    authorization-uri: https://kauth.kakao.com/oauth/authorize
                    user-name-attribute: id
                    token-uri: https://kauth.kakao.com/oauth/token
                    user-info-uri: https://kapi.kakao.com/v2/user/me

            registration:
                kakao:
                    client-name: kakao
                    authorization-grant-type: authorization_code

                    # 카카오 > 내 애플리케이션 > 카카오 로그인> 등록한 Redirect URI 입력
                    redirect-uri: http://localhost:8080/login/oauth2/code/kakao

                    # 카카오 > 내 애플리케이션 > 요약정보 > REST API 키
                    client-id: d6f8c283f8c977a9bd17812a9df3f5e3
                    
                    # 카카오 > 내 애플리케이션 > 카카오 로그인 > 보안 > Client Secret 생성 후 입력
                    client-secret: e4Gr11bJiKCbHMxRK2z73mQN4mnGwfyW

                    client-authentication-method: client_secret_post
                    scope: profile_nickname, profile_image